const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKVS0d9wG8rk8LAcYQE5tpxgT_lG-rCiEXareyht6qrxInUZoHrlE5PNo572fClopOGw/exec";

const sheetsAPI = {
  configured() {
    return SCRIPT_URL && !SCRIPT_URL.includes("YOUR_APPS");
  },
  async get(params = {}) {
    if (!this.configured()) return null;
    try {
      const qs = Object.entries({action:"getAll",...params}).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join("&");
      const res = await fetch(`${SCRIPT_URL}?${qs}`, {
        redirect: "follow",
        mode: "cors",
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    } catch(e) { console.warn("Sheets GET error:", e); return null; }
  },
  async post(data) {
    if (!this.configured()) return null;
    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(data)
      });
      return { ok: true };
    } catch(e) { console.warn("Sheets POST error:", e); return null; }
  }
};

function reconstructFromSheets(row) {
  const roleFits = computeRoleFit(row.scores || {}, row.personality, row.composite, row.risks);

    ...row,
    roleFits,
    hasPalms: row.hasPalms || false,
    quizTotal: row.quizTotal || 0,
    quizNorm: row.quizNorm || 0,
  };
}

// ── PALMS SCORING ─────────────────────────────────────────────────────────────
function scorePalms(palms) {
  if (!palms) return null;
  let score = 0;
  // Attendance % → 0–20
  const att = parseFloat(palms.attendancePct) || 0;
  if (att >= 90) score += 20;
  else if (att >= 80) score += 15;
  else if (att >= 70) score += 10;
  else if (att >= 60) score += 5;
  // Referrals given → 0–12
  const ref = parseInt(palms.referralsGiven) || 0;
  if (ref >= 12) score += 12;
  else if (ref >= 8) score += 9;
  else if (ref >= 4) score += 6;
  else if (ref >= 1) score += 3;
  // TYFCB received → 0–8 (in ₹ thousands)
  const ty = parseFloat(palms.tyfcb) || 0;
  if (ty >= 500) score += 8;
  else if (ty >= 200) score += 6;
  else if (ty >= 50) score += 4;
  else if (ty > 0) score += 2;
  // 1-2-1 meetings → 0–6
  const m = parseInt(palms.meetings121) || 0;
  if (m >= 10) score += 6;
  else if (m >= 6) score += 4;
  else if (m >= 3) score += 2;
  // Visitors invited → 0–4
  const vis = parseInt(palms.visitors) || 0;
  if (vis >= 4) score += 4;
  else if (vis >= 2) score += 2;
  else if (vis >= 1) score += 1;
  return score; // max 50
}

// ── COMPOSITE SCORING ─────────────────────────────────────────────────────────
function computeComposite(quizTotal, palmsScore) {
  // Quiz: 12–85 range → normalize to 0–50
  const quizNorm = Math.round(((quizTotal - 12) / (85 - 12)) * 50);
  if (palmsScore === null) return { composite: quizNorm * 2, quizNorm, palmsScore: null, haspalms: false };
  return { composite: Math.min(100, quizNorm + palmsScore), quizNorm, palmsScore, hasPalms: true };
}

function computeResult(answers, riskAnswers, palmsData, memberName) {
  const scores = { reliability:0, bni:0, referrals:0, influence:0, communication:0, energy:0 };
  const pVotes = {};
  let quizTotal = 0;
  QUIZ_QUESTIONS.forEach(q => {
    const a = answers[q.id];
    if (!a) return;
    if (q.indicator === "personality") {
      pVotes[a.personality] = (pVotes[a.personality] || 0) + 1;
    } else {
      scores[q.indicator] += a.score;
      quizTotal += a.score;
    }
  });
  const personality = (Object.entries(pVotes).sort((a,b) => b[1]-a[1])[0] ? Object.entries(pVotes).sort((a,b) => b[1]-a[1])[0][0] : "Connector");
  const risks = Object.values(riskAnswers).filter(Boolean).length;
  const palms = (palmsData ? palmsData[memberName] : null) || null;
  const palmsScore = scorePalms(palms);
  const { composite, quizNorm, hasPalms } = computeComposite(quizTotal, palmsScore);
  let category, categoryColor;
  
  // Adapted to BNI Traffic Light methodology style
  if (composite >= 80) { category = "Strategic Leader"; categoryColor = "#28a745"; } // Green
  else if (composite >= 62) { category = "Operational Leader"; categoryColor = "#0055a5"; } // Blue
  else if (composite >= 45) { category = "Emerging Leader"; categoryColor = "#ffc107"; } // Amber
  else { category = "Active Member"; categoryColor = "#CF2030"; } // Red
  
  const roleFits = computeRoleFit(scores, personality, composite, risks);
  return { quizTotal, quizNorm, scores, personality, category, categoryColor, risks, composite, palmsScore, palms, hasPalms, roleFits };
}

function computeRoleFit(scores, personality, composite, risks) {
  return ROLES.map(role => {
    const totalW = Object.values(role.weights).reduce((s,v) => s+v, 0);
    const weighted = Object.entries(role.weights).reduce((s,[ind,w]) => s+(scores[ind]||0)*w, 0);
    let fit = (weighted / (totalW * 5)) * 100;
    if (role.personalities[0] === personality) fit *= 1.18;
    else if (role.personalities[1] === personality) fit *= 1.08;
    if (risks >= 2) fit *= 0.65;
    if (composite < role.minComposite) fit *= 0.70;
    return { ...role, fitPct: Math.min(99, Math.round(fit)), belowMin: composite < role.minComposite, teamColor: TEAM_COLORS[role.team] };
  }).sort((a,b) => b.fitPct - a.fitPct);
}

// ── CSV PARSER ────────────────────────────────────────────────────────────────
function parsePalmsCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { error: "CSV appears empty or has no data rows." };
  const headers = lines[0].split(",").map(h => h.replace(/"/g,"").trim().toLowerCase());

  const findCol = (...keys) => {
    for (const k of keys) {
      const idx = headers.findIndex(h => h.includes(k));
      if (idx >= 0) return idx;
    }
    return -1;
  };

  const nameCol = findCol("name","member");
  const attCol = findCol("attendance %","att %","attend %","attendance_pct","att_pct","attendance percent");
  const refCol = findCol("referral","ref given","referrals given","ref_given");
  const tyCol = findCol("tyfcb","ty fcb","thank you","closed business","tyfcb received");
  const m121Col = findCol("1-2-1","1 2 1","one to one","1to1","121","meetings");
  const visCol = findCol("visitor","vis brought","visitors brought","vis_brought");

  if (nameCol < 0) return { error: "Cannot find a Name or Member column. Please check your CSV export." };

  const data = {};
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",").map(c => c.replace(/"/g,"").trim());
    const name = cols[nameCol];
    if (!name) continue;
    const matched = MEMBERS.find(m => m.toLowerCase() === name.toLowerCase() ||
      name.toLowerCase().includes(m.split(" ")[0].toLowerCase()));
    if (!matched) continue;
    data[matched] = {
      attendancePct: attCol >= 0 ? (cols[attCol] ? cols[attCol].replace("%","") : null) : null,
      referralsGiven: refCol >= 0 ? cols[refCol] : null,
      tyfcb: tyCol >= 0 ? (cols[tyCol] ? cols[tyCol].replace(/[₹,]/g,"") : null) : null,
      meetings121: m121Col >= 0 ? cols[m121Col] : null,
      visitors: visCol >= 0 ? cols[visCol] : null,
      raw: cols,
    };
  }
  return { data, headers, memberCount: Object.keys(data).length };
}

function CompositeGauge({ composite, quizNorm, palmsScore }) {

function RadarChart({ scores }) {
  const keys = ["reliability","bni","referrals","influence","communication","energy"];
  const labels = ["Reliability","BNI","Referrals","Influence","Comms","Energy"];
  const n = keys.length, cx = 100, cy = 100, r = 68;
  const pts = keys.map((k,i) => {
    const a = (i/n)*2*Math.PI-Math.PI/2, v = (scores[k]||0)/5;
    return { x: cx+r*v*Math.cos(a), y: cy+r*v*Math.sin(a) };
  });
  const poly = pts.map(p=>`${p.x},${p.y}`).join(" ");
  return (
    <svg width={200} height={200} viewBox="0 0 200 200">
      {[0.25,0.5,0.75,1].map(lvl => {
        const gp = keys.map((_,i)=>{const a=(i/n)*2*Math.PI-Math.PI/2;return`${cx+r*lvl*Math.cos(a)},${cy+r*lvl*Math.sin(a)}`;}).join(" ");
        return <polygon key={lvl} points={gp} fill="none" stroke="#e9ecef" strokeWidth={1}/>;
      })}
      {keys.map((_,i)=>{const a=(i/n)*2*Math.PI-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="#e9ecef" strokeWidth={1}/>;
      })}
      <polygon points={poly} fill="rgba(207,32,48,0.15)" stroke="#CF2030" strokeWidth={2}/>
      {labels.map((lbl,i)=>{const a=(i/n)*2*Math.PI-Math.PI/2;return<text key={i} x={cx+(r+22)*Math.cos(a)} y={cy+(r+22)*Math.sin(a)} textAnchor="middle" dominantBaseline="middle" fill="#495057" fontSize={9} fontWeight={600}>{lbl}</text>;
      })}
    </svg>
  );
}

// ── ADMIN DASHBOARD ───────────────────────────────────────────────────────────
function AdminDashboard({ assessedMembers, palmsData, assignments: sheetAssignments, syncStatus, onUploadPalms, onSaveAssignment, onSync, onBack }) {
  const [tab, setTab] = useState("roles");
  const [assignments, setAssignments] = useState(sheetAssignments || {});
  const [deliberation, setDeliberation] = useState({});
  const [pasteText, setPasteText] = useState("");
  const [pasteStatus, setPasteStatus] = useState("");
  const [pasteMsg, setPasteMsg] = useState("");
  const [uploadMethod, setUploadMethod] = useState("file");
  useEffect(() => { if (sheetAssignments) setAssignments(prev => ({...sheetAssignments,...prev})); }, [sheetAssignments]);
  const teams = ["VP Team","President's Team","Secretary-Treasurer Team"];
  const assessed = Object.entries(assessedMembers);

  function processCSVText(text) {
    const result = parsePalmsCSV(text);
    if (result.error) {
      setPasteStatus("error"); setPasteMsg("Parse error: " + result.error);
    } else {
      onUploadPalms(result.data);
      setPasteStatus("ok");
      setPasteMsg("✓ PALMS data loaded for " + result.memberCount + " members. Composite scores updated.");
    }
  }

  function handleFileChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => processCSVText(ev.target.result);
    reader.readAsText(file);
  }

  function handlePasteSubmit() {
    if (!pasteText.trim()) { setPasteStatus("error"); setPasteMsg("Please paste CSV text first."); return; }
    processCSVText(pasteText);
  }

  const getAsmFit = (name, roleId) => {
    const m = assessedMembers[name];
    if (!m) return null;
    return m.roleFits ? m.roleFits.find(r => r.id === roleId) : null;
  };

  const gaps = ROLES.filter(role => {
    if (!role.assignees.primary) return true;
    const allA = [role.assignees.primary, role.assignees.secondary, ...(role.assignees.support||[])].filter(Boolean);
    const anyAssessed = allA.some(n => assessedMembers[n]);
    if (!anyAssessed) return false;
    const bestFit = allA.reduce((best,n) => {
      const m = assessedMembers[n];
      if (!m) return best;
      const rf = m.roleFits ? m.roleFits.find(r => r.id === role.id) : null;
      return rf && rf.fitPct > best ? rf.fitPct : best;
    }, 0);
    return bestFit < 45;
  });

  const palmsLoaded = Object.keys(palmsData).length > 0;

  return (
    <div className="app-container" style={{ padding:"28px 16px" }}>
      <div style={{ maxWidth:860, margin:"0 auto" }}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:24, flexWrap:"wrap", gap:14 }}>
          <div>
            <div style={{ fontSize:10, color:"#CF2030", fontWeight:800, letterSpacing:2, marginBottom:4 }}>BNI MIRACLE · LEADERSHIP TEAM ONLY</div>
            <h1 style={{ fontSize:22, fontWeight:900, color:"#212529" }}>Chapter Selection Dashboard</h1>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            {sheetsAPI.configured() && (
              <button onClick={onSync} title="Sync from Google Sheets"
                style={{ padding:"8px 14px", borderRadius:8, border:"1px solid #c3e6cb", background:"#f1fcf4", color:syncStatus==="syncing"?"#ffc107":syncStatus==="synced"?"#28a745":syncStatus==="error"?"#CF2030":"#495057", fontSize:11, fontWeight:700, cursor:"pointer", letterSpacing:0.5 }}>
                {syncStatus==="syncing"?"⟳ SYNCING...":syncStatus==="synced"?"✓ SYNCED":syncStatus==="error"?"⚠ SYNC ERR":"⟳ SYNC"}
              </button>
            )}
            {!sheetsAPI.configured() && (
              <span style={{ fontSize:10, color:"#6c757d", fontWeight:700, padding:"8px 12px", background:"#e9ecef", borderRadius:8 }}>LOCAL MODE</span>
            )}
            {[["roles","Role Map"],["members","Members"],["gaps","Gaps"],["assign","Assignments"],["upload","PALMS Upload"]].map(([k,l]) => (
              <button key={k} onClick={() => setTab(k)}
                style={{ padding:"8px 14px", borderRadius:8, border:`2px solid ${tab===k?"#CF2030":"#e9ecef"}`, background:tab===k?"#CF2030":"#ffffff", color:tab===k?"#ffffff":"#6c757d", fontSize:11, fontWeight:800, cursor:"pointer", letterSpacing:0.5, transition:"all 0.15s" }}>{l}
              </button>
            ))}
          </div>
        </div>

        {/* Stats */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:12, marginBottom:24 }}>
          {[
            {label:"Members",value:38,color:"#CF2030"},
            {label:"Assessed",value:assessed.length,color:"#0055a5"},
            {label:"PALMS Loaded",value:Object.keys(palmsData).length,color:"#28a745"},
            {label:"Vacant Roles",value:ROLES.filter(r=>!r.assignees.primary).length,color:"#CF2030"},
            {label:"Gaps Flagged",value:gaps.length,color:"#ffc107"},

                        ⟳ SYNC FROM GOOGLE SHEETS NOW
                      </button>
                    )}
                    {!sheetsAPI.configured() && (
                      <div style={{ marginTop:20, padding:"12px 16px", background:"#fdf2f2", border:"1px solid #fad4d4", borderRadius:10, fontSize:12, fontWeight:600, color:"#CF2030" }}>
                        Google Sheets is not configured yet. Add your Script URL to index.html line 30 first.
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* PALMS loaded confirmation */}
            {Object.keys(palmsData).length > 0 && (
              <div style={{ background:"#f1fcf4", border:"1px solid #c3e6cb", borderRadius:12, padding:20, marginBottom:20 }}>
                <div style={{ fontSize:11, color:"#28a745", fontWeight:800, letterSpacing:1, marginBottom:12 }}>✓ PALMS DATA ACTIVE — {Object.keys(palmsData).length} MEMBERS LOADED{sheetsAPI.configured()?" · Saved to Google Sheets":""}</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {Object.keys(palmsData).map(n => (
                    <span key={n} style={{ fontSize:11, fontWeight:700, color:"#28a745", background:"#ffffff", padding:"4px 12px", borderRadius:20, border:"1px solid #c3e6cb" }}>{n}</span>
                  ))}
                </div>
              </div>
            )}
            <div style={{ background:"#ffffff", border:"1px solid #e9ecef", boxShadow:"0 4px 12px rgba(0,0,0,0.03)", borderRadius:16, padding:28 }}>
              <div style={{ fontSize:11, color:"#CF2030", fontWeight:800, letterSpacing:1.5, marginBottom:16 }}>COMPOSITE SCORE FORMULA</div>
              {[
                ["Attendance % (last 3 months)","0–20 pts","90%+ = 20 · 80–89% = 15 · 70–79% = 10 · 60–69% = 5"],
                ["Referrals Given","0–12 pts","12+ = 12 · 8–11 = 9 · 4–7 = 6 · 1–3 = 3"],
                ["TYFCB Received","0–8 pts","₹5L+ = 8 · ₹2–5L = 6 · ₹50k–2L = 4 · below = 2"],
                ["1-2-1 Meetings","0–6 pts","10+ = 6 · 6–9 = 4 · 3–5 = 2"],
                ["Visitors Invited","0–4 pts","4+ = 4 · 2–3 = 2 · 1 = 1"],
                ["Quiz Score (17 questions)","0–50 pts","Normalized from raw quiz range"],
              ].map(([label,pts,rule]) => (
                <div key={label} style={{ display:"grid", gridTemplateColumns:"1fr 80px 1fr", gap:14, padding:"10px 0", borderBottom:"1px solid #f8f9fa", alignItems:"start" }}>
                  <span style={{ fontSize:13, color:"#212529", fontWeight:700 }}>{label}</span>
                  <span style={{ fontSize:12, color:"#CF2030", fontWeight:800 }}>{pts}</span>
                  <span style={{ fontSize:12, color:"#6c757d", fontWeight:500 }}>{rule}</span>
                </div>
              ))}
              <div style={{ marginTop:16, padding:"14px 16px", background:"#f8f9fa", borderRadius:10, border:"1px solid #e9ecef" }}>
                <div style={{ fontSize:12, color:"#495057", fontWeight:600 }}>Total composite = PALMS (max 50) + Quiz (max 50) = <span style={{ color:"#CF2030", fontWeight:800 }}>100 points</span></div>
              </div>
            </div>
          </div>
        )}

        {/* ROLE MAP TAB */}
        {tab === "roles" && (
          <div>
            {teams.map(team => {
              const teamRoles = ROLES.filter(r => r.team === team);
              const tc = TEAM_COLORS[team];
              return (
                <div key={team} style={{ marginBottom:16, background:"#ffffff", border:`2px solid ${tc}30`, borderRadius:16, overflow:"hidden", boxShadow:"0 4px 10px rgba(0,0,0,0.02)" }}>
                  <div style={{ padding:"16px 20px", borderBottom:`2px solid ${tc}20`, background:`${tc}08`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <div style={{ fontSize:10, color:tc, fontWeight:900, letterSpacing:2, marginBottom:4 }}>{team.toUpperCase()}</div>
                      <div style={{ fontSize:14, fontWeight:800, color:"#212529" }}>{teamRoles.length} roles</div>
                    </div>
                    <div style={{ fontSize:10, color:"#6c757d", fontWeight:600 }}>
                      ● Strong fit  ◐ Moderate  ○ Not assessed / low fit
                    </div>
                  </div>
                  {teamRoles.map(role => {
                    const allA = [role.assignees.primary, role.assignees.secondary, ...(role.assignees.support||[])].filter(Boolean);
                    const isVacant = !role.assignees.primary;
                    return (
                      <div key={role.id} style={{ padding:"14px 20px", borderBottom:"1px solid #f8f9fa", display:"grid", gridTemplateColumns:"28px 1fr auto", gap:14, alignItems:"start" }}>
                        <div style={{ fontSize:20, paddingTop:2 }}>{role.icon}</div>
                        <div>
                          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, flexWrap:"wrap" }}>
                            <span style={{ fontSize:14, fontWeight:800, color:"#212529" }}>{role.title}</span>
                            {isVacant && <span style={{ fontSize:9, color:"#CF2030", background:"#fdf2f2", padding:"3px 8px", borderRadius:10, border:"1px solid #fad4d4", fontWeight:800 }}>VACANT</span>}
                            {assignments[role.id] && <span style={{ fontSize:9, color:"#0055a5", background:"#e6f2ff", padding:"3px 8px", borderRadius:10, border:"1px solid #b3d7ff", fontWeight:800 }}>ASSIGNED: {assignments[role.id]}</span>}
                          </div>
                          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                            {allA.length > 0 ? allA.map(n => {
                              const fit = getAsmFit(n, role.id);
                              const dotColor = fit ? fitColor(fit.fitPct) : "#adb5bd";
                              return (
                                <div key={n} style={{ display:"flex", alignItems:"center", gap:6, background:"#f8f9fa", borderRadius:10, padding:"4px 10px", border:"1px solid #e9ecef" }}>

                                  <span style={{ fontSize:12, color:"#495057", fontWeight:600 }}>{n}</span>

        {tab === "members" && (
          <div>
            {assessed.length === 0 ? (
              <div style={{ background:"#ffffff", border:"1px solid #e9ecef", borderRadius:16, padding:48, textAlign:"center", boxShadow:"0 4px 12px rgba(0,0,0,0.03)" }}>

                {assessed.sort((a,b) => b[1].composite - a[1].composite).map(([name,r], i) => {
                  const best = r.roleFits ? r.roleFits[0] : null;
                  const pd = PERSONALITY_DATA[r.personality];
                  return (
                    <div key={name} style={{ padding:"14px 20px", borderBottom:i<assessed.length-1?"1px solid #f8f9fa":"none", display:"grid", gridTemplateColumns:"1fr 80px 60px 80px 90px 1fr", gap:10, alignItems:"center" }}>

        )}

        {/* GAPS TAB */}
        {tab === "gaps" && (
          <div>
            {gaps.length === 0 ? (
              <div style={{ background:"#f1fcf4", border:"1px solid #c3e6cb", borderRadius:16, padding:40, textAlign:"center" }}>
                <div style={{ fontSize:36, marginBottom:14 }}>✅</div>
                <div style={{ color:"#28a745", fontSize:16, fontWeight:800 }}>No critical gaps detected</div>
              </div>
            ) : (
              <div>
                <div style={{ fontSize:14, color:"#6c757d", marginBottom:18, fontWeight:600 }}>{gaps.length} role{gaps.length!==1?"s":""} need attention.</div>
                {gaps.map(role => {
                  const allA = [role.assignees.primary, role.assignees.secondary, ...(role.assignees.support||[])].filter(Boolean);
                  const isVacant = !role.assignees.primary;
                  const tc = TEAM_COLORS[role.team];
                  const candidates = assessed
                    .filter(([n]) => !allA.includes(n))
                    .map(([n,r]) => ({ name:n, fit:(r.roleFits ? r.roleFits.find(rf => rf.id === role.id) : null), composite:r.composite }))
                    .filter(c => c.fit && c.composite >= role.minComposite * 0.8)
                    .sort((a,b) => b.fit.fitPct - a.fit.fitPct)
                    .slice(0,3);
                  return (
                    <div key={role.id} style={{ background:"#ffffff", border:`2px solid ${isVacant?"#fad4d4":"#ffeeba"}`, borderRadius:16, padding:20, marginBottom:16, boxShadow:"0 4px 10px rgba(0,0,0,0.02)" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:16 }}>
                        <span style={{ fontSize:24 }}>{role.icon}</span>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:15, fontWeight:800, color:"#212529", marginBottom:2 }}>{role.title}</div>
                          <div style={{ fontSize:10, color:tc, fontWeight:800, letterSpacing:0.5 }}>{role.team.toUpperCase()}</div>
                        </div>
                        <span style={{ fontSize:10, color:isVacant?"#CF2030":"#ffc107", background:isVacant?"#fdf2f2":"#fff8e5", padding:"4px 12px", borderRadius:12, border:`1px solid ${isVacant?"#fad4d4":"#ffeeba"}`, fontWeight:800 }}>
                          {isVacant?"VACANT":"LOW FIT"}
                        </span>
                      </div>
                      {candidates.length > 0 ? (
                        <>
                          <div style={{ fontSize:10, color:"#6c757d", fontWeight:800, letterSpacing:1, marginBottom:10 }}>DIAGNOSTIC CANDIDATES (composite ≥ {Math.round(role.minComposite*0.8)})</div>
                          {candidates.map(c => (
                            <div key={c.name} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 14px", background:"#f8f9fa", borderRadius:10, marginBottom:8, border:"1px solid #e9ecef" }}>
                              <span style={{ fontSize:13, color:"#495057", fontWeight:700 }}>{c.name}</span>
                              <div style={{ display:"flex", gap:16, alignItems:"center" }}>
                                <span style={{ fontSize:11, color:"#0055a5", fontWeight:700 }}>Composite: {c.composite}</span>
                                <span style={{ fontSize:13, fontWeight:800, color:fitColor(c.fit.fitPct) }}>{c.fit.fitPct}% fit</span>
                              </div>
                            </div>
                          ))}
                        </>
                      ) : (
                        <div style={{ fontSize:12, color:"#adb5bd", fontStyle:"italic", fontWeight:500 }}>No assessed candidates above threshold yet.</div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ASSIGNMENTS TAB */}
        {tab === "assign" && (
          <div>
            <div style={{ background:"#ffffff", border:"1px solid #e9ecef", borderRadius:16, padding:24, marginBottom:20, boxShadow:"0 4px 12px rgba(0,0,0,0.03)" }}>
              <div style={{ fontSize:11, color:"#CF2030", fontWeight:800, letterSpacing:1.5, marginBottom:8 }}>LEADERSHIP TEAM DELIBERATION LOG</div>
              <div style={{ fontSize:13, color:"#6c757d", marginBottom:20, fontWeight:500 }}>Record role assignment decisions and reasoning. This log is visible only to the leadership team.</div>
              {ROLES.map(role => {
                const tc = TEAM_COLORS[role.team];
                const isVacant = !role.assignees.primary;
                const top3ForRole = assessed
                  .map(([n,r]) => ({ name:n, fit:(r.roleFits ? r.roleFits.find(rf=>rf.id===role.id) : null), composite:r.composite }))
                  .filter(c => c.fit)
                  .sort((a,b) => b.fit.fitPct - a.fit.fitPct)
                  .slice(0,3);
                return (
                  <div key={role.id} style={{ marginBottom:14, background:"#f8f9fa", borderRadius:14, border:"1px solid #e9ecef", overflow:"hidden" }}>
                    <div style={{ padding:"14px 18px", borderBottom:"1px solid #e9ecef", background:"#ffffff", display:"flex", alignItems:"center", gap:12 }}>
                      <span style={{ fontSize:18 }}>{role.icon}</span>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:14, fontWeight:800, color:"#212529", marginBottom:2 }}>{role.title}</div>
                        <div style={{ fontSize:10, color:tc, fontWeight:800 }}>{role.team.toUpperCase()}</div>
                      </div>
                      {isVacant && <span style={{ fontSize:10, color:"#CF2030", background:"#fdf2f2", padding:"3px 8px", borderRadius:10, border:"1px solid #fad4d4", fontWeight:800 }}>VACANT</span>}
                      {assignments[role.id] && <span style={{ fontSize:11, color:"#0055a5", fontWeight:800 }}>→ {assignments[role.id]}</span>}
                    </div>
                    <div style={{ padding:"14px 18px" }}>
                      <div style={{ display:"flex", gap:10, marginBottom:12, flexWrap:"wrap" }}>
                        <select onChange={e => setAssignments(prev => ({...prev,[role.id]:e.target.value}))} value={assignments[role.id]||""}
                          style={{ flex:1, minWidth:200, padding:"10px 14px", background:"#ffffff", border:"1px solid #ced4da", borderRadius:10, color:assignments[role.id]?"#212529":"#6c757d", fontSize:13, fontWeight:600, outline:"none", cursor:"pointer" }}>
                          <option value="">Record assignment decision...</option>
                          {MEMBERS.map(m => {
                            const fit = (function(){var _a=assessed.find(function(_r){return _r[0]===m});return _a&&_a[1]&&_a[1].roleFits&&_a[1].roleFits.find(function(rf){return rf.id===role.id});})();
                            return <option key={m} value={m}>{m}{fit?` (${fit.fitPct}% fit)`:""}</option>;
                          })}
                        </select>
                      </div>
                      {top3ForRole.length > 0 && (
                        <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                          <span style={{ fontSize:10, color:"#6c757d", fontWeight:800, letterSpacing:0.5, alignSelf:"center" }}>DIAGNOSTIC TOP 3:</span>
                          {top3ForRole.map(c => (
                            <span key={c.name} onClick={() => setAssignments(prev=>({...prev,[role.id]:c.name}))}
                              style={{ fontSize:11, fontWeight:700, color:fitColor(c.fit.fitPct), background:"#ffffff", padding:"4px 12px", borderRadius:20, border:`1px solid ${fitColor(c.fit.fitPct)}50`, cursor:"pointer", transition:"all 0.1s" }}>
                              {c.name} {c.fit.fitPct}%
                            </span>
                          ))}
                        </div>
                      )}
                      <textarea placeholder="Reasoning / notes for this decision (visible to leadership team only)..."
                        value={deliberation[role.id]||""} onChange={e => setDeliberation(prev=>({...prev,[role.id]:e.target.value}))}
                        style={{ width:"100%", padding:"12px 14px", background:"#ffffff", border:"1px solid #ced4da", borderRadius:10, color:"#495057", fontSize:12, fontWeight:500, outline:"none", resize:"vertical", minHeight:60, boxSizing:"border-box" }}/>
                      {(assignments[role.id] || deliberation[role.id]) && (
                        <button onClick={() => onSaveAssignment(role.id, role.title, assignments[role.id]||"", deliberation[role.id]||"")}

        <button onClick={onBack} style={{ marginTop:24, padding:"12px 24px", background:"transparent", border:"2px solid #ced4da", borderRadius:12, color:"#495057", fontSize:12, fontWeight:800, cursor:"pointer", letterSpacing:1 }}>
          ← BACK
        </button>
      </div>
    </div>

}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [screen,          setScreen]          = useState("welcome");
  const [memberName,      setMemberName]       = useState("");
  const [result,          setResult]           = useState(null);
  const [assessedMembers, setAssessedMembers]  = useState({});
  const [palmsData,       setPalmsData]        = useState({});
  const [syncStatus,      setSyncStatus]       = useState("idle");
  const [assignments,     setAssignments]      = useState({});

  useEffect(() => {
    if (screen === "dashboard") syncFromSheets();
  }, [screen]);

  async function syncFromSheets() {
    if (!sheetsAPI.configured()) return;
    setSyncStatus("syncing");
    try {
      const data = await sheetsAPI.get({ action: "getAll" });
      if (!data) { setSyncStatus("error"); return; }

      if (data.assessments && data.assessments.length > 0) {
        const rebuilt = {};
        data.assessments.forEach(row => {
          rebuilt[row.memberName] = reconstructFromSheets(row);
        });
        setAssessedMembers(prev => ({ ...prev, ...rebuilt }));
      }

      if (data.palms && Object.keys(data.palms).length > 0) {
        setPalmsData(data.palms);
        setAssessedMembers(prev => {
          const updated = { ...prev };
          Object.entries(updated).forEach(([name, r]) => {
            const palms = data.palms[name] || null;
            if (palms) {
              const palmsScore = scorePalms(palms);
              const { composite, quizNorm, hasPalms } = computeComposite(r.quizTotal || 0, palmsScore);
              let category, categoryColor;
              if (composite >= 80)      { category="Strategic Leader";   categoryColor="#28a745"; }
              else if (composite >= 62) { category="Operational Leader"; categoryColor="#0055a5"; }
              else if (composite >= 45) { category="Emerging Leader";    categoryColor="#ffc107"; }
              else                      { category="Active Member";      categoryColor="#CF2030"; }
              const roleFits = computeRoleFit(r.scores, r.personality, composite, r.risks);
              updated[name] = { ...r, composite, quizNorm, palmsScore, palms, hasPalms, category, categoryColor, roleFits };
            }
          });
          return updated;
        });
      }

      if (data.assignments) setAssignments(data.assignments);

      setSyncStatus("synced");
    } catch(e) {
      console.error("Sync error:", e);
      setSyncStatus("error");
    }
  }

  function handleStart(name) { setMemberName(name); setScreen("quiz"); }

  async function handleComplete(answers, riskAnswers) {
    const r = computeResult(answers, riskAnswers, palmsData, memberName);
    setResult(r);
    setAssessedMembers(prev => ({ ...prev, [memberName]: r }));
    setScreen("results");
    
    sheetsAPI.post({
      action        : "saveAssessment",
      memberName,
      composite     : r.composite,
      quizTotal     : r.quizTotal,
      quizNorm      : r.quizNorm,
      palmsScore    : r.palmsScore,
      hasPalms      : r.hasPalms,
      category      : r.category,
      categoryColor : r.categoryColor,
      personality   : r.personality,
      risks         : r.risks,
      scores        : r.scores,
      riskFlags     : Object.entries(riskAnswers).filter(([,v])=>v).map(([k])=>k)
    });
  }

  function handlePalmsUpload(data) {
    setPalmsData(data);
    setAssessedMembers(prev => {
      const updated = {};
      Object.entries(prev).forEach(([name, r]) => {
        const palms = data[name] || null;
        const palmsScore = scorePalms(palms);
        const { composite, quizNorm, hasPalms } = computeComposite(r.quizTotal || 0, palmsScore);
        let category, categoryColor;
        if (composite >= 80)      { category="Strategic Leader";   categoryColor="#28a745"; }
        else if (composite >= 62) { category="Operational Leader"; categoryColor="#0055a5"; }
        else if (composite >= 45) { category="Emerging Leader";    categoryColor="#ffc107"; }
        else                      { category="Active Member";      categoryColor="#CF2030"; }
        const roleFits = computeRoleFit(r.scores, r.personality, composite, r.risks);
        updated[name] = { ...r, composite, quizNorm, palmsScore, palms, hasPalms, category, categoryColor, roleFits };
      });
      return updated;
    });
    sheetsAPI.post({ action: "savePalms", palmsData: data });
  }

  async function handleSaveAssignment(roleId, roleTitle, assignedMember, notes) {
    setAssignments(prev => ({ ...prev, [roleId]: { assignedMember, notes, timestamp: new Date().toISOString() } }));
    sheetsAPI.post({ action: "saveAssignment", roleId, roleTitle, assignedMember, notes });
  }

  let ActiveScreen = null;
  if (screen === "welcome")   ActiveScreen = <WelcomeScreen onStart={handleStart} onAdmin={() => setScreen("dashboard")}/>;
  if (screen === "quiz")      ActiveScreen = <QuizScreen memberName={memberName} onComplete={handleComplete}/>;
  if (screen === "results")   ActiveScreen = <ResultsScreen memberName={memberName} result={result} onViewDashboard={() => setScreen("dashboard")} onRetake={() => setScreen("welcome")}/>;
  if (screen === "dashboard") ActiveScreen = <AdminDashboard
    assessedMembers={assessedMembers} palmsData={palmsData} assignments={assignments} syncStatus={syncStatus}
    onUploadPalms={handlePalmsUpload} onSaveAssignment={handleSaveAssignment} onSync={syncFromSheets} onBack={() => setScreen(result ? "results" : "welcome")}
  />;

  return (
    <>
      {ActiveScreen}
      <div className="credit-footer">
        Made by Anirban Pal, President, BNI Miracle, April-September 2026
